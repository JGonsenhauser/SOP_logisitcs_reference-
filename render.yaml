services:
  - type: web
    name: sop-logistics-reference
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: ENVIRONMENT
        value: production
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DB_PATH
        value: /data/sop_app.db
    disk:
      name: sop-data
      mountPath: /data
      sizeGB: 1
    autoDeploy: true
    plan: starter
