<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOP Admin Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a73e8; --primary-dark: #1557b0; --primary-light: #e8f0fe;
            --success: #0d904f; --warning: #e37400; --danger: #c62828;
            --bg: #f0f2f5; --card: #fff; --sidebar-bg: #1a1a2e;
            --text: #1a1a2e; --text2: #5f6368; --border: #e0e0e0;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }

        /* ── LOGIN ── */
        .login-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #1a1a2e, #16213e); display: flex; align-items: center; justify-content: center; z-index: 999; }
        .login-overlay.hidden { display: none; }
        .login-card { background: white; border-radius: 16px; padding: 40px; width: 380px; text-align: center; }
        .login-card h1 { font-size: 22px; margin-bottom: 6px; }
        .login-card p { color: var(--text2); margin-bottom: 24px; font-size: 14px; }
        .login-card input { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 10px; font-size: 16px; margin-bottom: 16px; text-align: center; }
        .login-card button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .login-error { color: var(--danger); font-size: 14px; margin-top: 8px; }

        /* ── LAYOUT ── */
        .app-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: var(--sidebar-bg); color: white; padding: 20px 0; position: fixed; top: 0; bottom: 0; left: 0; z-index: 50; }
        .sidebar h2 { padding: 0 20px; font-size: 16px; margin-bottom: 4px; }
        .sidebar .sub { padding: 0 20px; font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 28px; }
        .nav-item { display: block; width: 100%; padding: 12px 20px; background: none; border: none; color: rgba(255,255,255,0.6); font-size: 14px; text-align: left; cursor: pointer; border-left: 3px solid transparent; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { color: white; background: rgba(255,255,255,0.1); border-left-color: var(--primary); font-weight: 600; }
        .main { margin-left: 220px; flex: 1; padding: 28px; }
        .page { display: none; }
        .page.active { display: block; }
        .page-title { font-size: 22px; font-weight: 700; margin-bottom: 20px; }

        /* ── CARDS ── */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: white; border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
        .stat-card .num { font-size: 32px; font-weight: 700; color: var(--primary); }
        .stat-card .lbl { font-size: 13px; color: var(--text2); margin-top: 4px; }

        /* ── TABLES ── */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        th { background: #f8f9fa; padding: 12px 14px; text-align: left; font-size: 12px; text-transform: uppercase; color: var(--text2); font-weight: 600; }
        td { padding: 12px 14px; border-top: 1px solid var(--border); font-size: 14px; }
        tr:hover td { background: #fafbfc; }

        /* ── BUTTONS ── */
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { background: #f8f9fa; }
        .btn-danger { background: none; border: 1px solid var(--danger); color: var(--danger); }
        .btn-success { background: var(--success); color: white; }

        /* ── MODAL ── */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: flex-start; justify-content: center; z-index: 100; padding: 30px; overflow-y: auto; }
        .modal-overlay.open { display: flex; }
        .modal { background: white; border-radius: 16px; width: 100%; max-width: 700px; margin: auto; }
        .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 18px; }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text2); }
        .modal-body { padding: 24px; max-height: 70vh; overflow-y: auto; }
        .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

        /* ── FORMS ── */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px;
        }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-hint { font-size: 11px; color: var(--text2); margin-top: 2px; }

        /* ── SOP EDITOR ── */
        .sop-editor { margin-top: 20px; }
        .sop-cat-section { background: white; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 14px; overflow: hidden; }
        .sop-cat-header {
            padding: 14px 18px; display: flex; align-items: center; gap: 10px;
            background: #f8f9fa; cursor: pointer; user-select: none; font-weight: 600; font-size: 14px;
        }
        .sop-cat-header .icon { font-size: 20px; }
        .sop-cat-header .toggle { margin-left: auto; font-size: 16px; color: var(--text2); transition: transform 0.2s; }
        .sop-cat-section.collapsed .sop-cat-body { display: none; }
        .sop-cat-section.collapsed .toggle { transform: rotate(-90deg); }
        .sop-cat-body { padding: 14px 18px; }
        .sop-field { margin-bottom: 12px; }
        .sop-field label { display: block; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
        .sop-field input, .sop-field select, .sop-field textarea {
            width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px;
        }
        .sop-field textarea { min-height: 50px; resize: vertical; }
        .sop-field .hint { font-size: 11px; color: var(--text2); }
        .sop-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* ── SEARCH BAR ── */
        .search-bar { display: flex; gap: 10px; margin-bottom: 18px; }
        .search-bar input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }

        /* ── ACTIVITY LOG ── */
        .activity-item { padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
        .activity-item .time { color: var(--text2); font-size: 12px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .badge-blue { background: var(--primary-light); color: var(--primary); }
        .badge-green { background: #e8f5e9; color: var(--success); }
        .badge-orange { background: #fff3e0; color: var(--warning); }
    </style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div class="login-overlay" id="loginOverlay">
    <div class="login-card">
        <h1>SOP Admin Dashboard</h1>
        <p>Manage customer delivery requirements</p>
        <input type="password" id="adminPin" placeholder="Admin PIN" onkeydown="if(event.key==='Enter')adminLogin()">
        <button onclick="adminLogin()">Sign In</button>
        <div class="login-error" id="loginError"></div>
    </div>
</div>

<!-- ═══ APP ═══ -->
<div class="app-layout">
    <div class="sidebar">
        <h2>SOP Manager</h2>
        <div class="sub">Customer Requirements</div>
        <button class="nav-item active" onclick="showPage('dashboard')">Dashboard</button>
        <button class="nav-item" onclick="showPage('customers')">Customers</button>
        <button class="nav-item" onclick="showPage('drivers')">Drivers</button>
        <button class="nav-item" onclick="showPage('audit')">Audit Log</button>
    </div>
    <div class="main">

        <!-- ── DASHBOARD ── -->
        <div class="page active" id="page_dashboard">
            <h2 class="page-title">Dashboard</h2>
            <div class="stats-row" id="dashStats"></div>
            <h3 style="margin-bottom:12px;">Recent Activity</h3>
            <div id="dashActivity" style="background:white;border-radius:12px;padding:16px;border:1px solid var(--border);"></div>
        </div>

        <!-- ── CUSTOMERS ── -->
        <div class="page" id="page_customers">
            <h2 class="page-title">Customers</h2>
            <div class="search-bar">
                <input type="text" id="custSearch" placeholder="Search customers..." oninput="loadCustomers()">
                <button class="btn btn-primary" onclick="openAddCustomer()">+ Add Customer</button>
            </div>
            <table>
                <thead><tr><th>Company</th><th>Type</th><th>City</th><th>Contact</th><th>SOP Reqs</th><th>Actions</th></tr></thead>
                <tbody id="custTableBody"></tbody>
            </table>
        </div>

        <!-- ── DRIVERS ── -->
        <div class="page" id="page_drivers">
            <h2 class="page-title">Drivers</h2>
            <button class="btn btn-primary" onclick="openAddDriver()" style="margin-bottom:16px;">+ Add Driver</button>
            <table>
                <thead><tr><th>ID</th><th>Name</th><th>Phone</th><th>Email</th><th>Status</th></tr></thead>
                <tbody id="driverTableBody"></tbody>
            </table>
        </div>

        <!-- ── AUDIT ── -->
        <div class="page" id="page_audit">
            <h2 class="page-title">Audit Log</h2>
            <div id="auditList" style="background:white;border-radius:12px;padding:16px;border:1px solid var(--border);"></div>
        </div>
    </div>
</div>

<!-- ═══ CUSTOMER MODAL ═══ -->
<div class="modal-overlay" id="custModal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="custModalTitle">Add Customer</h3>
            <button class="modal-close" onclick="closeModal('custModal')">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-row">
                <div class="form-group"><label>Company Name *</label><input id="cf_company_name"></div>
                <div class="form-group"><label>Type</label>
                    <select id="cf_customer_type">
                        <option value="commercial">Commercial</option>
                        <option value="warehouse">Warehouse</option>
                        <option value="retail">Retail</option>
                        <option value="restaurant">Restaurant</option>
                        <option value="medical">Medical</option>
                        <option value="construction">Construction</option>
                        <option value="residential">Residential</option>
                        <option value="school">School / Campus</option>
                        <option value="pharmacy">Pharmacy</option>
                        <option value="event_venue">Event Venue</option>
                        <option value="government">Government</option>
                        <option value="industrial">Industrial</option>
                    </select>
                </div>
            </div>
            <div class="form-group"><label>Address</label><input id="cf_address_line1" placeholder="Street address"></div>
            <div class="form-row">
                <div class="form-group"><label>City</label><input id="cf_city"></div>
                <div class="form-group">
                    <div class="form-row">
                        <div class="form-group"><label>State</label><input id="cf_state" maxlength="2" placeholder="TX"></div>
                        <div class="form-group"><label>ZIP</label><input id="cf_zip_code"></div>
                    </div>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Primary Contact</label><input id="cf_primary_contact_name"></div>
                <div class="form-group"><label>Phone</label><input id="cf_primary_contact_phone"></div>
            </div>
            <div class="form-group"><label>Email</label><input id="cf_primary_contact_email"></div>
            <div class="form-group"><label>Notes</label><textarea id="cf_notes" rows="2"></textarea></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('custModal')">Cancel</button>
            <button class="btn btn-primary" id="custSaveBtn" onclick="saveCustomer()">Save Customer</button>
        </div>
    </div>
</div>

<!-- ═══ SOP EDITOR MODAL ═══ -->
<div class="modal-overlay" id="sopModal">
    <div class="modal" style="max-width:800px;">
        <div class="modal-header">
            <h3 id="sopModalTitle">Edit SOP Requirements</h3>
            <button class="modal-close" onclick="closeModal('sopModal')">&times;</button>
        </div>
        <div class="modal-body" id="sopEditorBody" style="max-height:75vh;"></div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('sopModal')">Cancel</button>
            <button class="btn btn-success" onclick="saveSOP()">Save All Requirements</button>
        </div>
    </div>
</div>

<!-- ═══ DRIVER MODAL ═══ -->
<div class="modal-overlay" id="driverModal">
    <div class="modal" style="max-width:450px;">
        <div class="modal-header">
            <h3>Add Driver</h3>
            <button class="modal-close" onclick="closeModal('driverModal')">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-row">
                <div class="form-group"><label>First Name *</label><input id="df_first_name"></div>
                <div class="form-group"><label>Last Name</label><input id="df_last_name"></div>
            </div>
            <div class="form-group"><label>Phone</label><input id="df_phone"></div>
            <div class="form-group"><label>Email</label><input id="df_email"></div>
            <div class="form-group"><label>PIN *</label><input id="df_pin" type="password" maxlength="6" placeholder="4-6 digit PIN"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('driverModal')">Cancel</button>
            <button class="btn btn-primary" onclick="saveDriver()">Save Driver</button>
        </div>
    </div>
</div>

<script>
const API = window.location.origin;
let token = null;
let sopSchema = null;
let editingCustId = null;

function headers() { return { 'Content-Type': 'application/json', 'X-Session-Token': token || '' }; }
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ── AUTH ──
async function adminLogin() {
    const pin = document.getElementById('adminPin').value;
    document.getElementById('loginError').textContent = '';
    const res = await fetch(`${API}/api/admin/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({pin}) });
    const data = await res.json();
    if (!res.ok) { document.getElementById('loginError').textContent = data.error; return; }
    token = data.token;
    document.getElementById('loginOverlay').classList.add('hidden');
    loadSchema();
    showPage('dashboard');
}

async function loadSchema() {
    const res = await fetch(`${API}/api/sop-schema`);
    sopSchema = await res.json();
}

// ── NAVIGATION ──
function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page_' + name).classList.add('active');
    document.querySelectorAll('.nav-item')[['dashboard','customers','drivers','audit'].indexOf(name)].classList.add('active');
    if (name === 'dashboard') loadDashboard();
    if (name === 'customers') loadCustomers();
    if (name === 'drivers') loadDrivers();
    if (name === 'audit') loadAudit();
}

// ── DASHBOARD ──
async function loadDashboard() {
    const res = await fetch(`${API}/api/admin/dashboard`, { headers: headers() });
    const data = await res.json();
    const s = data.stats;
    document.getElementById('dashStats').innerHTML = `
        <div class="stat-card"><div class="num">${s.total_customers}</div><div class="lbl">Active Customers</div></div>
        <div class="stat-card"><div class="num">${s.total_drivers}</div><div class="lbl">Active Drivers</div></div>
        <div class="stat-card"><div class="num">${s.total_requirements}</div><div class="lbl">SOP Requirements</div></div>
        <div class="stat-card"><div class="num">${s.recent_lookups}</div><div class="lbl">Lookups (24hr)</div></div>
    `;
    const act = data.recent_activity || [];
    document.getElementById('dashActivity').innerHTML = act.length === 0 ? '<div style="color:var(--text2)">No recent activity</div>' :
        act.map(a => `<div class="activity-item">
            <span class="badge ${a.user_type==='driver'?'badge-blue':'badge-green'}">${esc(a.user_type)}</span>
            <strong>${esc(a.user_name||'')}</strong> ${esc(a.action)} on ${esc(a.resource_type)}
            ${a.details ? '- '+esc(a.details) : ''}
            <div class="time">${esc(a.timestamp)}</div>
        </div>`).join('');
}

// ── CUSTOMERS ──
async function loadCustomers() {
    const q = document.getElementById('custSearch')?.value || '';
    const res = await fetch(`${API}/api/admin/customers?q=${encodeURIComponent(q)}`, { headers: headers() });
    const data = await res.json();
    document.getElementById('custTableBody').innerHTML = (data.customers || []).map(c => `<tr>
        <td><strong>${esc(c.company_name)}</strong></td>
        <td><span class="badge badge-blue">${esc(c.customer_type)}</span></td>
        <td>${esc(c.city||'')}, ${esc(c.state||'')}</td>
        <td>${esc(c.primary_contact_name||'')} ${c.primary_contact_phone ? '<br><small>'+esc(c.primary_contact_phone)+'</small>' : ''}</td>
        <td><strong>${c.req_count||0}</strong></td>
        <td>
            <button class="btn btn-sm btn-primary" onclick="openSOPEditor(${c.id}, '${esc(c.company_name)}')">Edit SOP</button>
            <button class="btn btn-sm btn-outline" onclick="editCustomer(${c.id})">Edit Info</button>
            <button class="btn btn-sm btn-danger" onclick="deactivateCustomer(${c.id}, '${esc(c.company_name)}')">Remove</button>
        </td>
    </tr>`).join('');
}

function openAddCustomer() {
    editingCustId = null;
    document.getElementById('custModalTitle').textContent = 'Add Customer';
    ['cf_company_name','cf_customer_type','cf_address_line1','cf_city','cf_state','cf_zip_code','cf_primary_contact_name','cf_primary_contact_phone','cf_primary_contact_email','cf_notes'].forEach(id => {
        const el = document.getElementById(id);
        if (el.tagName === 'SELECT') el.selectedIndex = 0; else el.value = '';
    });
    openModal('custModal');
}

async function editCustomer(id) {
    const res = await fetch(`${API}/api/admin/customers/${id}`, { headers: headers() });
    const c = await res.json();
    editingCustId = id;
    document.getElementById('custModalTitle').textContent = 'Edit Customer';
    document.getElementById('cf_company_name').value = c.company_name || '';
    document.getElementById('cf_customer_type').value = c.customer_type || 'commercial';
    document.getElementById('cf_address_line1').value = c.address_line1 || '';
    document.getElementById('cf_city').value = c.city || '';
    document.getElementById('cf_state').value = c.state || '';
    document.getElementById('cf_zip_code').value = c.zip_code || '';
    document.getElementById('cf_primary_contact_name').value = c.primary_contact_name || '';
    document.getElementById('cf_primary_contact_phone').value = c.primary_contact_phone || '';
    document.getElementById('cf_primary_contact_email').value = c.primary_contact_email || '';
    document.getElementById('cf_notes').value = c.notes || '';
    openModal('custModal');
}

async function saveCustomer() {
    const body = {
        company_name: document.getElementById('cf_company_name').value,
        customer_type: document.getElementById('cf_customer_type').value,
        address_line1: document.getElementById('cf_address_line1').value,
        city: document.getElementById('cf_city').value,
        state: document.getElementById('cf_state').value,
        zip_code: document.getElementById('cf_zip_code').value,
        primary_contact_name: document.getElementById('cf_primary_contact_name').value,
        primary_contact_phone: document.getElementById('cf_primary_contact_phone').value,
        primary_contact_email: document.getElementById('cf_primary_contact_email').value,
        notes: document.getElementById('cf_notes').value,
    };
    if (!body.company_name) { alert('Company name required'); return; }
    if (editingCustId) {
        await fetch(`${API}/api/admin/customers/${editingCustId}`, { method:'PUT', headers: headers(), body: JSON.stringify(body) });
    } else {
        await fetch(`${API}/api/admin/customers`, { method:'POST', headers: headers(), body: JSON.stringify(body) });
    }
    editingCustId = null;
    closeModal('custModal');
    loadCustomers();
}

async function deactivateCustomer(id, name) {
    if (!confirm(`Remove "${name}" from active customers?`)) return;
    await fetch(`${API}/api/admin/customers/${id}`, { method:'DELETE', headers: headers() });
    loadCustomers();
}

// ── SOP EDITOR ──
let currentSOPCustomerId = null;

async function openSOPEditor(custId, companyName) {
    currentSOPCustomerId = custId;
    document.getElementById('sopModalTitle').textContent = `SOP Requirements - ${companyName}`;
    if (!sopSchema) await loadSchema();

    // Get existing requirements
    const res = await fetch(`${API}/api/admin/customers/${custId}/sop`, { headers: headers() });
    const data = await res.json();
    const existing = {};
    for (const r of (data.requirements || [])) {
        existing[r.category + '::' + r.requirement_key] = r.requirement_value;
    }

    // Build editor
    let html = '';
    for (const [catKey, cat] of Object.entries(sopSchema)) {
        html += `<div class="sop-cat-section" id="sopcat_${catKey}">
            <div class="sop-cat-header" onclick="document.getElementById('sopcat_${catKey}').classList.toggle('collapsed')">
                <span class="icon">${cat.icon}</span> ${esc(cat.label)}
                <span class="toggle">&#9660;</span>
            </div>
            <div class="sop-cat-body">`;

        for (const [fieldKey, field] of Object.entries(cat.fields)) {
            const val = existing[catKey + '::' + fieldKey] || '';
            const inputId = `sop_${catKey}__${fieldKey}`;
            html += `<div class="sop-field">
                <label>${esc(field.label)}</label>`;

            if (field.type === 'textarea') {
                html += `<textarea id="${inputId}" placeholder="${esc(field.hint||'')}">${esc(val)}</textarea>`;
            } else if (field.type === 'select') {
                html += `<select id="${inputId}">
                    <option value="">-- Select --</option>
                    ${(field.options||[]).map(o => `<option value="${esc(o)}" ${val===o?'selected':''}>${esc(o)}</option>`).join('')}
                </select>`;
            } else if (field.type === 'yesno') {
                html += `<select id="${inputId}">
                    <option value="">-- Not set --</option>
                    <option value="Yes" ${val==='Yes'?'selected':''}>Yes</option>
                    <option value="No" ${val==='No'?'selected':''}>No</option>
                </select>`;
            } else if (field.type === 'number') {
                html += `<input type="number" id="${inputId}" value="${esc(val)}" placeholder="${esc(field.hint||'')}">`;
            } else if (field.type === 'time') {
                html += `<input type="time" id="${inputId}" value="${esc(val)}">`;
            } else {
                html += `<input type="text" id="${inputId}" value="${esc(val)}" placeholder="${esc(field.hint||'')}">`;
            }

            if (field.hint && field.type !== 'textarea') html += `<div class="hint">${esc(field.hint)}</div>`;
            html += `</div>`;
        }
        html += `</div></div>`;
    }
    document.getElementById('sopEditorBody').innerHTML = html;
    openModal('sopModal');
}

async function saveSOP() {
    const requirements = [];
    for (const [catKey, cat] of Object.entries(sopSchema)) {
        for (const fieldKey of Object.keys(cat.fields)) {
            const el = document.getElementById(`sop_${catKey}__${fieldKey}`);
            if (!el) continue;
            const val = el.value.trim();
            if (val && val !== '-- Not set --' && val !== '-- Select --') {
                requirements.push({ category: catKey, requirement_key: fieldKey, requirement_value: val });
            }
        }
    }
    const res = await fetch(`${API}/api/admin/customers/${currentSOPCustomerId}/sop`, {
        method: 'PUT', headers: headers(), body: JSON.stringify({ requirements })
    });
    const data = await res.json();
    alert(data.message || 'Saved');
    closeModal('sopModal');
    loadCustomers();
}

// ── DRIVERS ──
async function loadDrivers() {
    const res = await fetch(`${API}/api/admin/drivers`, { headers: headers() });
    const data = await res.json();
    document.getElementById('driverTableBody').innerHTML = (data.drivers || []).map(d => `<tr>
        <td><strong>${d.id}</strong></td>
        <td>${esc(d.first_name)} ${esc(d.last_name)}</td>
        <td>${esc(d.phone||'')}</td>
        <td>${esc(d.email||'')}</td>
        <td><span class="badge ${d.is_active?'badge-green':'badge-orange'}">${d.is_active?'Active':'Inactive'}</span></td>
    </tr>`).join('');
}

function openAddDriver() { openModal('driverModal'); }

async function saveDriver() {
    const body = {
        first_name: document.getElementById('df_first_name').value,
        last_name: document.getElementById('df_last_name').value,
        phone: document.getElementById('df_phone').value,
        email: document.getElementById('df_email').value,
        pin: document.getElementById('df_pin').value,
    };
    if (!body.first_name || !body.pin) { alert('Name and PIN required'); return; }
    const res = await fetch(`${API}/api/admin/drivers`, { method:'POST', headers: headers(), body: JSON.stringify(body) });
    const data = await res.json();
    alert(`Driver created! ID: ${data.id}`);
    closeModal('driverModal');
    loadDrivers();
}

// ── AUDIT ──
async function loadAudit() {
    const res = await fetch(`${API}/api/admin/audit?limit=100`, { headers: headers() });
    const data = await res.json();
    document.getElementById('auditList').innerHTML = (data.logs || []).map(l => `<div class="activity-item">
        <span class="badge ${l.user_type==='driver'?'badge-blue':'badge-green'}">${esc(l.user_type)}</span>
        <strong>${esc(l.action)}</strong> on ${esc(l.resource_type)}
        ${l.resource_id ? '#'+l.resource_id : ''}
        ${l.details ? '('+esc(l.details)+')' : ''}
        <div class="time">${esc(l.timestamp)}</div>
    </div>`).join('');
}

function esc(s) { if (!s && s !== 0) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
</script>
